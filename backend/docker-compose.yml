services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xmip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xmip}
      POSTGRES_DB: ${POSTGRES_DB:-xmip}
    volumes:
      - xmip_pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xmip} -d ${POSTGRES_DB:-xmip}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      APP_NAME: ${APP_NAME:-XMIP Backend}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-false}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://xmip:xmip@postgres:5432/xmip}
      AUTO_CREATE_TABLES: ${AUTO_CREATE_TABLES:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-false}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      API_KEY: ${API_KEY:-}
      API_KEY_HEADER_NAME: ${API_KEY_HEADER_NAME:-X-API-Key}
      REQUEST_LOGGING_ENABLED: ${REQUEST_LOGGING_ENABLED:-true}
      REQUEST_BODY_LOGGING_ENABLED: ${REQUEST_BODY_LOGGING_ENABLED:-false}
      RESPONSE_BODY_LOGGING_ENABLED: ${RESPONSE_BODY_LOGGING_ENABLED:-false}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-30}
      OPERATIONAL_AUDIT_ENABLED: ${OPERATIONAL_AUDIT_ENABLED:-true}
      DB_HEALTHCHECK_ENABLED: ${DB_HEALTHCHECK_ENABLED:-true}
      CONNECTORS_ENABLED: ${CONNECTORS_ENABLED:-false}
      RSS_CONNECTOR_ENABLED: ${RSS_CONNECTOR_ENABLED:-false}
      RSS_CONNECTOR_MAX_ITEMS: ${RSS_CONNECTOR_MAX_ITEMS:-20}
      RSS_CONNECTOR_TIMEOUT_SECONDS: ${RSS_CONNECTOR_TIMEOUT_SECONDS:-10}
      RSS_CONNECTOR_USER_AGENT: ${RSS_CONNECTOR_USER_AGENT:-XMIP-StagingBot/0.1}
      RSS_CONNECTOR_ALLOWED_DOMAINS: ${RSS_CONNECTOR_ALLOWED_DOMAINS:-}
      CONNECTOR_RUN_MODE: ${CONNECTOR_RUN_MODE:-manual}
      CONNECTOR_AUDIT_ENABLED: ${CONNECTOR_AUDIT_ENABLED:-true}
      CONNECTOR_REQUIRE_SOURCE_REFERENCE: ${CONNECTOR_REQUIRE_SOURCE_REFERENCE:-true}
      CONNECTOR_AUTO_PROMOTE: ${CONNECTOR_AUTO_PROMOTE:-false}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  xmip_pgdata:
